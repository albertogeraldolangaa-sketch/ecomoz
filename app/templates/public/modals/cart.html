<div class="modal-overlay" id="cart-modal">
    <div class="modal-header">
        <button class="modal-back-btn"><i class="fas fa-arrow-left"></i></button>
        <h2 class="modal-title">Meu Carrinho</h2>
    </div>
    <div class="modal-body">
        <div id="cart-items-list">
            <div class="empty-state">
                <div class="icon"><i class="fa-solid fa-shopping-cart"></i></div>
                <h3>Carrinho Vazio</h3>
                <p>Adicione produtos para ver o seu carrinho aqui.</p>
            </div>
        </div>
        
        <div class="cart-summary" style="display: none;">
            <div class="booking-summary">
                <p><strong>Subtotal:</strong> <span id="cart-subtotal">0.00 MZN</span></p>
                <p><strong>Taxa de entrega:</strong> <span id="cart-delivery">0.00 MZN</span></p>
                <p><strong>Total:</strong> <span id="cart-total">0.00 MZN</span></p>
            </div>
            
            <div class="cta-container">
                <button class="cta-button" id="cart-checkout-btn">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </div>
</div>
