<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aceda à sua Conta - Ecomoz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #fff; }
        .gallery-container { position: relative; height: 100vh; overflow: hidden; background-color: #1e3a8a; }
        .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(30, 58, 138, 0.95), rgba(30, 58, 138, 0.4)); z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; padding: 4rem; color: white; pointer-events: none; }
        .gallery-scroller { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 140%; margin-left: -20%; transform: rotate(-5deg) scale(1.1); }
        .gallery-item { width: 100%; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); opacity: 0.85; }
        .scroll-up { animation: scrollUp 45s linear infinite; } .scroll-down { animation: scrollDown 45s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scrollDown { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }
        .form-message { display: none; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; margin-bottom: 1rem; animation: fadeIn 0.3s ease-out; }
        .form-message.error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .form-message.success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .hidden-form { display: none; } .fade-in { animation: fadeIn 0.4s ease-in-out; }
        input:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .login-tab { cursor: pointer; padding-bottom: 0.75rem; border-bottom: 2px solid transparent; color: #6b7280; transition: all 0.2s; flex: 1; text-align: center; font-weight: 500; }
        .login-tab.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 700; }
    </style>
</head>
<body class="flex h-screen w-full">

    <!-- LADO ESQUERDO -->
    <div class="w-full lg:w-1/2 flex flex-col justify-between h-full bg-white relative z-20 overflow-y-auto">
        <div class="px-8 sm:px-12 lg:px-16 pt-8 pb-4">
            <a href="/" class="inline-flex items-center gap-2 text-2xl font-extrabold text-gray-900 tracking-tight">
                Ecomoz<span class="text-brand-600">.</span>
            </a>
        </div>

        <div class="flex-grow flex flex-col justify-center px-8 sm:px-12 lg:px-16 xl:px-24 py-8">
            <div class="w-full max-w-md mx-auto">
                
                <div id="auth-container" class="fade-in">
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-gray-900">Bem-vindo</h1>
                        <p class="text-gray-500 mt-2">Aceda ou crie a sua conta de lojista.</p>
                    </div>

                    <div class="flex mb-6 border-b border-gray-200">
                        <button id="tab-otp" class="login-tab active">Entrar/Criar (SMS)</button>
                        <button id="tab-pass" class="login-tab">Entrar com Senha</button>
                    </div>

                    <div id="auth-message" class="form-message"></div>

                    <!-- 1. FLUXO DE TELEMÓVEL (Registo e Login) -->
                    <form id="form-otp-flow" class="space-y-5" onsubmit="return false;">
                        
                        <!-- Passo A: Inserir Número -->
                        <div id="step-phone">
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wider">Número de Telemóvel</label>
                            <div class="flex">
                                <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-300 bg-gray-50 text-gray-500 font-medium">+258</span>
                                <input type="tel" id="phone-input" class="w-full px-4 py-3.5 rounded-r-xl border border-gray-300 focus:border-brand-500 focus:ring-0 outline-none transition-all bg-white text-lg" placeholder="841234567" required>
                            </div>
                            <button type="button" id="btn-send-otp" class="w-full mt-5 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-500/30 transform hover:-translate-y-0.5">
                                Enviar Código
                            </button>
                        </div>

                        <!-- Passo B: Validar OTP -->
                        <div id="step-verify" class="hidden-form">
                            <div class="text-center mb-6">
                                <p class="text-sm text-gray-600">Código enviado para <span id="display-phone" class="font-bold text-gray-900"></span></p>
                                <button type="button" id="btn-edit-phone" class="text-xs text-brand-600 hover:underline mt-1">Corrigir número</button>
                            </div>
                            <input type="text" id="otp-input" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-brand-500 focus:ring-0 outline-none text-center text-3xl tracking-[0.5em] font-bold text-brand-900" placeholder="000000" maxlength="6">
                            <button type="button" id="btn-verify-otp" class="w-full mt-6 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-500/30 transform hover:-translate-y-0.5">
                                Verificar
                            </button>
                        </div>

                        <!-- Passo C: Completar Registo (Apenas Novos) -->
                        <div id="step-complete" class="hidden-form space-y-4">
                            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 mb-4">
                                <h3 class="font-bold text-blue-900 text-sm">Número verificado!</h3>
                                <p class="text-xs text-blue-700">Finalize o registo com os detalhes da loja.</p>
                            </div>
                            
                            <!-- PRINCIPAL: NOME DA LOJA & SENHA -->
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1 uppercase">Nome da Loja</label>
                                <input type="text" id="reg-loja" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:border-brand-500 text-sm" required>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1 uppercase">Link da Loja</label>
                                <div class="flex rounded-lg shadow-sm">
                                    <span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 border-gray-300 bg-gray-100 text-gray-500 text-xs">ecomoz.com/</span>
                                    <input type="text" id="reg-slug" readonly class="flex-1 min-w-0 block w-full px-3 py-2.5 rounded-none rounded-r-lg border border-gray-300 bg-gray-50 text-sm text-gray-700 font-semibold" required>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1 uppercase">Senha (Mínimo 12 dígitos)</label>
                                <input type="password" id="reg-password" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:border-brand-500 text-sm" placeholder="••••••••••••" minlength="12" required>
                            </div>
                            <!-- FIM PRINCIPAL -->

                            <!-- SECUNDÁRIO/AUXILIAR (Escondidos por padrão, mas necessários no POST) -->
                            <div class="grid grid-cols-2 gap-4 pt-2 border-t border-gray-100">
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 mb-1 uppercase">Seu Nome</label>
                                    <input type="text" id="reg-nome" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:border-brand-500 text-sm" placeholder="Seu nome" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 mb-1 uppercase">Email (Opcional)</label>
                                    <input type="email" id="reg-email" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:border-brand-500 text-sm" placeholder="Para recuperação">
                                </div>
                            </div>
                            
                            <div class="p-3 bg-gray-50 rounded-lg border border-gray-200">
                                <p class="text-xs font-bold text-gray-700 mb-2">Tipo de Negócio:</p>
                                <div class="flex gap-4">
                                    <label class="flex items-center cursor-pointer"><input type="radio" name="reg-model" value="agendamento" checked class="mr-2 text-brand-600"> Agendamento</label>
                                    <label class="flex items-center cursor-pointer"><input type="radio" name="reg-model" value="delivery" class="mr-2 text-brand-600"> Delivery/Venda</label>
                                </div>
                            </div>

                            <button type="button" id="btn-finish-reg" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg transform hover:-translate-y-0.5">
                                Criar Conta
                            </button>
                        </div>
                    </form>

                    <!-- 2. LOGIN SENHA (Alternativa) -->
                    <form id="form-password-flow" class="space-y-5 hidden-form" onsubmit="return false;">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase">Telemóvel ou Email</label>
                            <input type="text" id="login-identifier" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-brand-500 focus:ring-0 outline-none transition-all" placeholder="841234567 ou seu@email.com" required>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <label class="block text-xs font-bold text-gray-700 uppercase">Senha</label>
                                <a href="/forgot-password" class="text-xs text-brand-600 hover:underline">Esqueceu?</a>
                            </div>
                            <input type="password" id="login-pass-input" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-brand-500 focus:ring-0 outline-none transition-all" required>
                        </div>
                        <button type="submit" id="btn-login-pass" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-500/30 transform hover:-translate-y-0.5">
                            Entrar
                        </button>
                    </form>

                </div>
            </div>
        </div>
        <div class="px-8 py-6 text-center sm:text-left border-t border-gray-50">
            <p class="text-sm text-gray-400 font-medium">&copy; 2025 Ecomoz.</p>
        </div>
    </div>

    <!-- LADO DIREITO: Galeria -->
    <div class="hidden lg:block lg:w-1/2 gallery-container">
        <div class="gallery-overlay">
            <h2 class="text-5xl font-bold mb-4 tracking-tight leading-tight">O seu negócio,<br>agora no digital.</h2>
            <p class="text-xl text-blue-100 font-light max-w-md">Crie sua conta em segundos usando apenas seu telemóvel.</p>
        </div>
        <div class="gallery-scroller p-8">
            <div class="gallery-col scroll-up">
                <img src="https://placehold.co/600x800/1e40af/ffffff?text=Agendamento" class="gallery-item">
                <img src="https://placehold.co/600x800/0f172a/ffffff?text=Barbearia" class="gallery-item">
                <img src="https://placehold.co/600x800/047857/ffffff?text=Gest%C3%A3o" class="gallery-item">
            </div>
            <div class="gallery-col scroll-down">
                <img src="https://placehold.co/600x800/d97706/ffffff?text=Marketing" class="gallery-item">
                <img src="https://placehold.co/600x800/4338ca/ffffff?text=Pagamentos" class="gallery-item">
                <img src="https://placehold.co/600x800/be185d/ffffff?text=Vendas" class="gallery-item">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messageEl = document.getElementById('auth-message');
            const tabOtp = document.getElementById('tab-otp');
            const tabPass = document.getElementById('tab-pass');
            const formOtp = document.getElementById('form-otp-flow');
            const formPass = document.getElementById('form-password-flow');

            const stepPhone = document.getElementById('step-phone');
            const stepVerify = document.getElementById('step-verify');
            const stepComplete = document.getElementById('step-complete');
            
            const inpPhone = document.getElementById('phone-input');
            const inpOtp = document.getElementById('otp-input');
            
            const regNome = document.getElementById('reg-nome');
            const regLoja = document.getElementById('reg-loja');
            const regSlug = document.getElementById('reg-slug');
            const regPass = document.getElementById('reg-password');
            const regEmail = document.getElementById('reg-email');


            // Slug Generator
            const generateSlug = (text) => text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-');
            regLoja.addEventListener('input', () => regSlug.value = generateSlug(regLoja.value));

            const showMessage = (msg, isError = true) => {
                messageEl.innerHTML = isError ? `<i class="bi bi-exclamation-circle-fill mr-2"></i>${msg}` : `<i class="bi bi-check-circle-fill mr-2"></i>${msg}`;
                messageEl.className = `form-message ${isError ? 'error' : 'success'}`;
                messageEl.style.display = 'block';
            };

            // Tabs Toggle
            tabOtp.addEventListener('click', () => {
                tabOtp.classList.add('active'); tabPass.classList.remove('active');
                formOtp.classList.remove('hidden-form'); formPass.classList.add('hidden-form');
                messageEl.style.display = 'none';
            });
            tabPass.addEventListener('click', () => {
                tabPass.classList.add('active'); tabOtp.classList.remove('active');
                formPass.classList.remove('hidden-form'); formOtp.classList.add('hidden-form');
                messageEl.style.display = 'none';
            });

            // 1. Enviar OTP
            document.getElementById('btn-send-otp').addEventListener('click', async () => {
                const phone = inpPhone.value;
                if(!phone) return showMessage('Insira o número.');
                
                const btn = document.getElementById('btn-send-otp');
                btn.disabled = true; btn.innerHTML = 'A enviar...';

                try {
                    const res = await fetch('/api/auth/send-otp', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phone, role: 'owner' })
                    });
                    const data = await res.json();
                    if(res.ok) {
                        stepPhone.classList.add('hidden-form');
                        stepVerify.classList.remove('hidden-form');
                        document.getElementById('display-phone').textContent = phone;
                        showMessage('Código enviado por SMS.', false);
                    } else {
                        showMessage(data.error);
                    }
                } catch(e) { showMessage('Erro de conexão.'); }
                btn.disabled = false; btn.textContent = 'Continuar';
            });

            // 2. Verificar OTP
            document.getElementById('btn-verify-otp').addEventListener('click', async () => {
                const phone = inpPhone.value;
                const code = inpOtp.value;
                if(!code) return showMessage('Insira o código.');
                
                const btn = document.getElementById('btn-verify-otp');
                btn.disabled = true; btn.innerHTML = 'A verificar...';

                try {
                    const res = await fetch('/api/auth/verify-otp', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phone, code, role: 'owner' })
                    });
                    const data = await res.json();
                    
                    if(res.ok) {
                        if(data.status === 'success') {
                            window.location.href = data.redirect;
                        } else if(data.status === 'new_user') {
                            stepVerify.classList.add('hidden-form');
                            stepComplete.classList.remove('hidden-form');
                            showMessage('Número validado. Complete o registo.', false);
                        }
                    } else {
                        showMessage(data.error);
                        btn.disabled = false; btn.textContent = 'Verificar';
                    }
                } catch(e) { 
                    showMessage('Erro de conexão.'); 
                    btn.disabled = false; btn.textContent = 'Verificar';
                }
            });

            // 3. Finalizar Registo
            document.getElementById('btn-finish-reg').addEventListener('click', async () => {
                const phone = inpPhone.value;
                const nome = regNome.value || "Lojista Ecomoz"; // Nome Padrão se vazio
                const loja = regLoja.value;
                const slug = regSlug.value;
                const pass = regPass.value;
                const email = regEmail.value;

                if(!nome || !loja || !pass || !slug) return showMessage('Preencha os campos obrigatórios (Nome, Loja, Senha).');
                if(pass.length < 12) return showMessage('A senha deve ter no mínimo 12 caracteres.');

                const btn = document.getElementById('btn-finish-reg');
                btn.disabled = true; btn.innerHTML = 'A criar conta...';

                const model = document.querySelector('input[name="reg-model"]:checked').value;

                try {
                    const res = await fetch('/api/auth/register-owner', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phone, nome, nome_loja: loja, slug, password: pass, email, business_model: model })
                    });
                    const data = await res.json();
                    if(res.ok) {
                        window.location.href = data.redirect;
                    } else {
                        showMessage(data.error);
                        btn.disabled = false; btn.textContent = 'Criar Conta';
                    }
                } catch(e) {
                    showMessage('Erro de conexão.');
                    btn.disabled = false; btn.textContent = 'Criar Conta';
                }
            });

            // 4. Login com Senha
            formPass.addEventListener('submit', async (e) => {
                e.preventDefault();
                const identifier = document.getElementById('login-identifier').value;
                const password = document.getElementById('login-pass-input').value;
                
                const btn = document.getElementById('btn-login-pass');
                btn.disabled = true; btn.innerHTML = 'A entrar...';

                try {
                    const res = await fetch('/api/login-password', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ identifier, password })
                    });
                    const data = await res.json();
                    if(res.ok) window.location.href = data.redirect;
                    else showMessage(data.error);
                } catch(e) { showMessage('Erro de conexão.'); }
                
                btn.disabled = false; btn.textContent = 'Entrar';
            });

            // Botão Editar Número
            document.getElementById('btn-edit-phone').addEventListener('click', () => {
                stepVerify.classList.add('hidden-form');
                stepPhone.classList.remove('hidden-form');
                messageEl.style.display = 'none';
            });
        });
    </script>
</body>
</html>
