<div id="modal-add-produto-simples" class="modal fixed inset-0 z-50 hidden justify-end items-start flex">
    
    <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onclick="closeModal('modal-add-produto-simples')"></div>

    <div class="modal-slide-over w-full sm:w-[500px] lg:w-[600px] h-full flex flex-col bg-white dark:bg-gray-900 shadow-2xl transform transition-transform duration-300 translate-x-full">
        
        <div class="modal-header-sticky px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-white/90 dark:bg-gray-900/90 backdrop-blur-md z-20">
            <div>
                <h3 id="modal-produto-simples-title" class="text-xl font-bold text-gray-900 dark:text-white">Novo Produto</h3>
                <p class="text-xs text-gray-500 mt-0.5">Adição rápida ao inventário.</p>
            </div>
            <button type="button" onclick="closeModal('modal-add-produto-simples')" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 sm:p-8 space-y-8 scroll-smooth">
            <form id="form-produto-simples" data-id="">
                
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-900 dark:text-gray-100">Fotografia</label>
                    <div class="group relative w-full h-64 rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all bg-gray-50 dark:bg-gray-800/50 flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                        
                        <input type="file" id="prod_image_simples" class="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*">
                        <input type="hidden" id="prod_image_url_simples">
                        
                        <div id="prod_image_placeholder" class="text-center p-6 transition-transform duration-300 group-hover:scale-105">
                            <div class="w-14 h-14 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                                <i data-lucide="image-plus" class="w-7 h-7"></i>
                            </div>
                            <p class="font-semibold text-gray-900 dark:text-white">Clique para carregar</p>
                            <p class="text-xs text-gray-500 mt-1">PNG, JPG até 5MB</p>
                        </div>

                        <img id="prod_image_preview_simples" src="" class="absolute inset-0 w-full h-full object-cover hidden transition-opacity duration-300">
                        
                        <div class="absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity z-20 hidden" id="prod_image_actions">
                            <span class="bg-white dark:bg-gray-800 text-xs font-bold px-3 py-1.5 rounded-lg shadow-md border border-gray-100 dark:border-gray-700">Alterar Foto</span>
                        </div>
                    </div>
                </div>

                <hr class="border-gray-100 dark:border-gray-800">

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Nome do Produto</label>
                        <input type="text" id="prod_nome_simples" class="block w-full rounded-xl border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 px-4 py-3 text-base focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-colors" placeholder="Ex: T-Shirt Premium Algodão" required>
                    </div>

                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Preço</label>
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-gray-400 font-medium">MT</span>
                                <input type="number" id="prod_preco_simples" class="block w-full rounded-xl border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 pl-12 pr-4 py-3 text-base font-bold text-gray-900 dark:text-white focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-colors" placeholder="0.00" required step="0.01">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Stock</label>
                            <input type="number" id="prod_stock_simples" class="block w-full rounded-xl border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 px-4 py-3 text-base focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-colors" placeholder="ILIMITADO" value="99">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">Descrição <span class="text-xs font-normal text-gray-400">(Opcional)</span></label>
                        <textarea id="prod_desc_simples" rows="4" class="block w-full rounded-xl border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-0 transition-colors resize-none" placeholder="Descreva os detalhes, materiais e características..."></textarea>
                    </div>
                </div>

                <hr class="border-gray-100 dark:border-gray-800">

                <div class="bg-blue-50 dark:bg-blue-900/10 rounded-2xl p-5 border border-blue-100 dark:border-blue-800/30">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h4 class="text-sm font-bold text-blue-900 dark:text-blue-100">Pagamento Online</h4>
                            <p class="text-xs text-blue-700 dark:text-blue-300 mt-0.5">Como o cliente paga no checkout?</p>
                        </div>
                        <div class="p-2 bg-white dark:bg-blue-900/50 rounded-lg text-blue-600">
                            <i data-lucide="credit-card" class="w-5 h-5"></i>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="relative">
                            <select id="prod_payment_mode_simples" class="block w-full rounded-xl border-blue-200 dark:border-blue-800 bg-white dark:bg-gray-800 px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-blue-500/20 cursor-pointer" onchange="document.getElementById('prod_deposit_container_simples').classList.toggle('hidden', this.value !== 'deposito')">
                                <option value="integral">Pagamento Total (100%)</option>
                                <option value="deposito">Apenas Sinal / Depósito</option>
                            </select>
                        </div>
                        
                        <div id="prod_deposit_container_simples" class="hidden animate-fade-in-down">
                            <div class="flex items-center gap-3 mt-3">
                                <div class="relative flex-1">
                                    <span class="absolute left-3 top-2 text-blue-400 text-xs font-bold">MT</span>
                                    <input type="number" id="prod_deposit_value_simples" class="block w-full rounded-lg border-blue-200 dark:border-blue-800 bg-white dark:bg-gray-800 pl-9 pr-3 py-2 text-sm font-bold focus:border-blue-500 focus:ring-blue-500/20" placeholder="Valor do Sinal">
                                </div>
                                <p class="text-[10px] text-blue-600 dark:text-blue-300 max-w-[150px] leading-tight">
                                    O restante é pago no ato da entrega.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

            </form>
        </div>

        <div class="modal-footer-sticky px-6 py-4 bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 z-20 flex items-center justify-between">
            <button type="button" onclick="closeModal('modal-add-produto-simples')" class="px-6 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-colors">
                Cancelar
            </button>
            <button type="submit" form="form-produto-simples" class="btn btn-primary px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 hover:-translate-y-0.5 transition-all">
                Guardar Produto
            </button>
        </div>

    </div>
</div>

<script>
    // Pequeno script para melhorar a UX do upload de imagem dentro deste modal
    document.getElementById('prod_image_simples').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const preview = document.getElementById('prod_image_preview_simples');
        const placeholder = document.getElementById('prod_image_placeholder');
        const actions = document.getElementById('prod_image_actions');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('opacity-0'); // Esconde o texto suavemente
                actions.classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        }
    });
</script>
