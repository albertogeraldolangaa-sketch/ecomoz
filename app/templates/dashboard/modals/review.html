<div id="modal-view-review" class="modal fixed inset-0 z-50 hidden items-center justify-center p-4 flex">
    
    <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onclick="closeModal('modal-view-review')"></div>

    <div class="modal-center-card w-full max-w-lg bg-white dark:bg-gray-900 shadow-2xl transform transition-all duration-300 overflow-hidden flex flex-col rounded-2xl">
        
        <div class="relative h-24 bg-gradient-to-r from-amber-400 to-orange-500 flex justify-end p-4">
            <button onclick="closeModal('modal-view-review')" class="p-2 bg-black/10 hover:bg-black/20 text-white rounded-full backdrop-blur-md transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="px-8 pb-8 -mt-12 flex flex-col flex-1 overflow-y-auto">
            
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 rounded-full border-4 border-white dark:border-gray-900 bg-gray-100 dark:bg-gray-800 shadow-md flex items-center justify-center overflow-hidden">
                    <img id="review_client_avatar" src="" class="w-full h-full object-cover hidden"> <i data-lucide="user" class="w-10 h-10 text-gray-400" id="review_client_icon"></i>
                </div>
                <h3 id="review_client_name" class="mt-3 text-xl font-bold text-gray-900 dark:text-white text-center">Cliente</h3>
                <div id="review_stars" class="flex gap-1 text-amber-500 mt-1">
                    </div>
            </div>

            <form id="form-review-reply" data-id="" class="space-y-6">
                
                <div class="relative bg-gray-50 dark:bg-gray-800/50 p-5 rounded-2xl border border-gray-100 dark:border-gray-700">
                    <div class="absolute -top-3 left-6 bg-white dark:bg-gray-800 px-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                        Disse:
                    </div>
                    <p id="review_text" class="text-gray-700 dark:text-gray-300 italic leading-relaxed text-center">
                        "..."
                    </p>
                    <i data-lucide="quote" class="absolute bottom-3 right-3 w-6 h-6 text-gray-200 dark:text-gray-700 -z-0 opacity-50"></i>
                </div>

                <hr class="border-gray-100 dark:border-gray-800">

                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-bold text-gray-900 dark:text-white flex items-center gap-2">
                            <i data-lucide="message-circle" class="w-4 h-4 text-blue-500"></i>
                            Responder Publicamente
                        </label>
                        <span class="text-xs text-gray-400">Visível na loja</span>
                    </div>
                    
                    <div class="relative">
                        <textarea id="review_reply_text" rows="4" 
                                  class="block w-full rounded-xl border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-3 text-sm focus:border-blue-500 focus:ring-blue-500/20 transition-shadow resize-none" 
                                  placeholder="Agradeça ou resolva a questão..."></textarea>
                        
                        <div class="absolute bottom-2 right-2 flex gap-2">
                            <button type="button" onclick="insertQuickReply('Obrigado pelo feedback!')" class="text-[10px] bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded-md transition-colors text-gray-600 dark:text-gray-400">
                                "Obrigado!"
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full btn-primary-pro py-3.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-500/20 transition-transform active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-4 h-4"></i>
                    Publicar Resposta
                </button>

            </form>
        </div>
    </div>
</div>

<script>
    // Pequena função auxiliar para inserir respostas rápidas
    function insertQuickReply(text) {
        const textarea = document.getElementById('review_reply_text');
        textarea.value = text;
        textarea.focus();
    }
</script>
