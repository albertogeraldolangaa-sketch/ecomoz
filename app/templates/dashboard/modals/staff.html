<div id="modal-add-equipa" class="modal fixed inset-0 z-50 hidden items-start justify-end">
    
    <div class="modal-overlay absolute inset-0 bg-black/30 backdrop-blur-sm transition-opacity" onclick="closeModal('modal-add-equipa')"></div>

    <div class="modal-content relative w-full sm:w-[420px] h-full bg-white dark:bg-gray-800 shadow-2xl flex flex-col animate-slide-left border-l border-gray-100 dark:border-gray-700">
        
        <div class="p-6 border-b border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 z-10">
            <div class="flex items-start justify-between">
                <div class="flex gap-3">
                    <div class="w-10 h-10 rounded-xl bg-teal-50 dark:bg-teal-900/20 flex items-center justify-center text-teal-600">
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h3 id="modal-equipa-title" class="text-lg font-bold text-gray-900 dark:text-white">Gerir Membro</h3>
                        <p class="text-sm text-gray-500">Gestão de equipa e permissões.</p>
                    </div>
                </div>
                <button onclick="closeModal('modal-add-equipa')" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <form id="form-equipa" class="flex-1 overflow-y-auto p-6 space-y-6">
            
            <div class="flex items-center space-x-5">
                <div class="relative group shrink-0">
                    <div class="w-20 h-20 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden hover:border-teal-500 transition-colors">
                        <img id="staff_avatar_preview" src="" class="w-full h-full object-cover hidden">
                        <i data-lucide="camera" class="w-6 h-6 text-gray-400 group-hover:text-teal-500" id="staff_avatar_icon"></i>
                    </div>
                    <input type="file" id="staff_avatar" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    <input type="hidden" id="staff_avatar_url">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-900">Foto de Perfil</label>
                    <p class="text-xs text-gray-500 mt-1">Clique para carregar. Recomendado 200x200px.</p>
                </div>
            </div>

            <div class="space-y-4">
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="staff_nome" class="form-input w-full rounded-lg border-gray-300 focus:border-teal-500 focus:ring-teal-500/20" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Cargo / Título</label>
                    <input type="text" id="staff_titulo" class="form-input w-full rounded-lg border-gray-300 focus:border-teal-500 focus:ring-teal-500/20" placeholder="Ex: Barbeiro Sénior">
                </div>
                
                <div class="form-group">
                    <label class="form-label mb-2 block">Serviços Realizados</label>
                    <div id="staff-services-list" class="space-y-2 max-h-60 overflow-y-auto p-1">
                        </div>
                </div>
            </div>
        </form>

        <div class="p-4 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex justify-end gap-3">
            <button type="button" onclick="closeModal('modal-add-equipa')" class="btn btn-outline bg-white">Cancelar</button>
            <button type="submit" form="form-equipa" class="px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-medium shadow-sm transition-colors">Salvar Membro</button>
        </div>
    </div>
</div>
