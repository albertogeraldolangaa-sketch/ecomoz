<div id="modal-add-client" class="modal fixed inset-0 z-50 hidden items-start justify-end">
    
    <div class="modal-overlay absolute inset-0 bg-black/30 backdrop-blur-sm transition-opacity" onclick="closeModal('modal-add-client')"></div>

    <div class="modal-content relative w-full sm:w-96 h-full bg-gray-50 dark:bg-gray-900 shadow-2xl flex flex-col animate-slide-left border-l border-gray-200 dark:border-gray-700 rounded-l-xl overflow-hidden">
        
        <div class="flex items-center justify-between px-6 py-4 bg-indigo-50 dark:bg-indigo-900/30 border-b border-indigo-100 dark:border-indigo-800">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white dark:bg-gray-800 text-indigo-600 rounded-lg shadow-sm border border-indigo-100 dark:border-indigo-700">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
                <h3 id="modal-client-title" class="text-lg font-semibold text-gray-800 dark:text-white">Detalhes do Cliente</h3>
            </div>
            <button type="button" onclick="closeModal('modal-add-client')" class="p-1.5 text-gray-500 hover:bg-white hover:text-indigo-600 hover:shadow-sm rounded-full transition-all duration-200">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            
            <div class="flex flex-col items-center">
                <div class="w-24 h-24 rounded-full bg-white dark:bg-gray-800 border-4 border-indigo-50 dark:border-indigo-900/50 shadow-sm flex items-center justify-center text-indigo-300 mb-3 relative group cursor-pointer">
                    <i data-lucide="user" class="w-10 h-10"></i>
                    <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                        <i data-lucide="camera" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <p class="text-xs font-medium text-gray-400 uppercase tracking-widest">Perfil do Cliente</p>
            </div>

            <form id="form-client" class="space-y-5" data-id="">
                
                <div class="form-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Nome Completo</label>
                    <input type="text" id="client_nome" class="form-input w-full border border-gray-300 rounded-md px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-500 transition-shadow bg-white dark:bg-gray-800 dark:border-gray-600" placeholder="Ex: Ana Silva" required>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm border border-gray-200 dark:border-gray-700 space-y-4">
                    <h4 class="text-xs font-bold text-gray-400 uppercase flex items-center gap-2">
                        <i data-lucide="contact" class="w-3 h-3"></i> Contactos
                    </h4>
                    
                    <div class="form-group">
                        <label class="block text-xs text-gray-500 mb-1">Telemóvel</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i data-lucide="phone" class="w-4 h-4"></i>
                            </div>
                            <input type="tel" id="client_telefone" class="form-input w-full pl-10 border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-500 text-sm" placeholder="84 123 4567">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="block text-xs text-gray-500 mb-1">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </div>
                            <input type="email" id="client_email" class="form-input w-full pl-10 border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-500 text-sm" placeholder="cliente@exemplo.com">
                        </div>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm border border-gray-200 dark:border-gray-700">
                    <h4 class="text-xs font-bold text-gray-400 uppercase flex items-center gap-2 mb-2">
                        <i data-lucide="sticky-note" class="w-3 h-3"></i> Notas Internas
                    </h4>
                    <textarea id="client_notas" rows="4" class="form-input w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-500 text-sm bg-yellow-50/50 dark:bg-gray-700/30 resize-none" placeholder="Preferências, histórico de atendimento, etc..."></textarea>
                </div>

            </form>
        </div>

        <div class="sticky bottom-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 px-6 py-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <div class="flex items-center justify-end gap-3">
                <button type="button" onclick="closeModal('modal-add-client')" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">
                    Cancelar
                </button>
                <button type="submit" form="form-client" class="px-6 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-md shadow-md shadow-indigo-200 transition-all transform hover:-translate-y-0.5">
                    Salvar Alterações
                </button>
            </div>
        </div>

    </div>
</div>
