<header class="sticky top-0 z-20 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
    <div class="flex items-center justify-between h-16 px-4 md:px-8">
        <button id="mobile-menu-button" class="md:hidden text-gray-600 dark:text-gray-300">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>

        <h1 id="page-title" class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Métricas</h1>

        <div class="flex items-center space-x-4">
            <button class="text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-white relative" onclick="showNotificationsDropdown()">
                <i data-lucide="bell" class="w-6 h-6"></i>
            </button>
            
            <button id="theme-toggle" class="text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-white">
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
            </button>
            
            <img id="header-avatar" src="https://placehold.co/40x40/6B7280/E5E7EB?text=A" alt="Avatar do Utilizador" class="w-10 h-10 rounded-full border-2 border-gray-300 dark:border-gray-600">
        </div>
    </div>
</header>
