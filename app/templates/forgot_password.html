<!DOCTYPE html>
<html lang="pt-BR" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Password - MarcaçãoPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class', theme: { extend: { fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        .form-message { display: none; font-size: 0.875rem; margin: 16px 0; padding: 12px 16px; border-radius: 8px; }
        .form-message.error { color: #991b1b; background-color: #fef2f2; border: 1px solid #fecaca; display: block; }
        .form-message.success { color: #166534; background-color: #f0fdf4; border: 1px solid #bbf7d0; display: block; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-inter antialiased">
    <div class="flex min-h-screen flex-col items-center justify-center px-4 py-12">
        <a href="/" class="mb-8 text-4xl font-bold text-gray-900 dark:text-white">
            Marcação<span class="text-red-600">Pro</span>
        </a>
        <div class="w-full max-w-md overflow-hidden rounded-xl bg-white shadow-2xl dark:bg-gray-900 dark:border dark:border-gray-800">
            <div class="p-8 sm:p-10">
                <div class="text-center">
                    <h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Recuperar Password</h2>
                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                        Insira o seu email e enviaremos um link para redefinir a sua password.
                    </p>
                </div>

                <div id="message" class="form-message"></div>

                <form id="form-forgot" class="mt-8 space-y-5" onsubmit="return false;">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
                        <input type="email" id="email" required
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white focus:border-red-500 focus:ring-red-500"
                               placeholder="seu.nome@email.com">
                    </div>
                    <div>
                        <button type="submit" id="submit-button"
                                class="flex w-full justify-center rounded-md bg-red-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900 disabled:opacity-75">
                            Enviar Link de Recuperação
                        </button>
                    </div>
                </form>

                <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
                    Lembrou-se?
                    <a href="/login" class="font-medium text-red-600 hover:text-red-500">
                        Voltar ao Login
                    </a>
                </p>
            </div>
        </div>
    </div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('form-forgot');
    const submitButton = document.getElementById('submit-button');
    const messageEl = document.getElementById('message');
    const emailInput = document.getElementById('email');

    const showMessage = (message, isError = true) => {
        messageEl.textContent = message;
        messageEl.className = `form-message ${isError ? 'error' : 'success'}`;
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showMessage('', false); 
        submitButton.disabled = true;
        submitButton.textContent = 'A enviar...';

        try {
            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.value })
            });
            const result = await response.json();
            
            if (response.ok) {
                showMessage(result.message, false); // "Email enviado..."
                emailInput.disabled = true;
                submitButton.textContent = 'Enviado!';
            } else {
                showMessage(result.error, true); // "Email não encontrado."
                submitButton.disabled = false;
                submitButton.textContent = 'Enviar Link de Recuperação';
            }
        } catch (error) {
            showMessage('Erro de conexão. Tente novamente.', true);
            submitButton.disabled = false;
            submitButton.textContent = 'Enviar Link de Recuperação';
        }
    });
});
</script>
</body>
</html>
